<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Log In</title>
    <script src="https://kit.fontawesome.com/627ad3e1e2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../src/style.css">
</head>
<body class="log">
    <header class="nav">
        <div class="logo">
          <a href="index.html" class="logo-link">
            <img src="../images/logo.jpg" alt="LittleCare Clinic logo" class="nav-logo">
            <h1 class="logo-title">LittleCare <span class="span">Clinic</span></h1>
          </a>
        </div>
        <div>
            <nav class="nav-links">
                <a href="../index.html" class="nav-link ">Home</a>
                <a href="learn.html" class="nav-link">Learn</a>
                <a href="for kids.html" class="nav-link">For Kids</a>
                <a href="services.html" class="nav-link">Services</a>
                <a href="contact us.html" class="nav-link">Contact</a>
                <a href="sign up.html" class="nav-link">Sign Up</a>
            </nav>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search..."class="search-input">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </header>
    
    <main class="auth-section cloud-bg">
        <div class="container flex-center">
            
            <div class="form-card login-card">
                <h2>Welcome Back</h2>

                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" required>
                            <i class="fas fa-lock input-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="yellow-submit-btn">Login</button>
                </form>

                <div class="form-footer">
                    <a href="#" class="footer-link">Forgot Password?</a>
                    <a href="sign up.html" class="footer-link">Don't have an account?</a>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div class="container footer-grid">
            <div class="footer-col">
                <h4><i class="fas fa-phone-alt"></i> Contact Us</h4>
                <a href="tel:+233276899234" class="footer-link">+233 276 899 234</a>
                <a href="mailto:ama@gmail.com" class="footer-link">ama@gmail.com</a>
            </div>
            <div class="footer-col">
                <h4> <i class="fa-solid fa-building"></i>Company</h4>
                <a href="about.html" class="footer-link">About us</a>
                <a href="privacy.html" class="footer-link">Privacy Policy</a>
                <a href="terms.html" class="footer-link">Terms of Service</a>
            </div>
            <div class="footer-col">
                <h4> <i class="fa-solid fa-circle-question"></i>FAQs</h4>
                <a href="faq.html" class="footer-link">FAQs</a>
                <a href="support.html" class="footer-link">Support</a>
            </div>
            <div class="footer-col">
                <h4>Social Media</h4>
                <div class="social-icons">
                   <a href="#" class="social-link"><i class="fab fa-facebook"></i></a>
                   <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                   <a href="#" class="social-link"><i class="fab fa-linkedin"></i></a>
                   <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2026 LittleCare Clinic. All rights reserved.</p>
        </div>
