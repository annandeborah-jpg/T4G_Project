<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://kit.fontawesome.com/627ad3e1e2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../src/style.css">
</head>
<body class="sign">
    <header class="nav">
        <div class="logo">
            <h1>❤️LittleCare <span class="span">Clinic</span></h1>
        </div>
        <div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="learn.html">Learn</a>
                <a href="for kids.html">For Kids</a>
                <a href="services.html">Services</a>
                <a href="contact us.html">Contact</a>
                <a href="sign up.html" class="signup-btn">Sign Up</a>
            </nav>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search...">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <main class="auth-section cloud-bg">
        <div class="container flex-center">
            
            <div class="form-card">
                <h2>Create Account</h2>

                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="parent-name">Parent Name</label>
                        <input type="text" id="parent-name" name="parent-name" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="input-group">
                        <label for="child-name">Child's Name</label>
                        <input type="text" id="child-name" name="child-name" required>
                    </div>

                    <div class="input-group">
                        <label for="child-age">Child's Age</label>
                        <input type="number" id="child-age" name="child-age" min="0" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </div>

                    <button type="submit" class="yellow-submit-btn">Sign Up</button>
                </form>

                <div class="form-footer">
                    <a href="log in.html" class="login-link">Already have an account?</a>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div class="container footer-grid">
            <div class="footer-col">
                <h4>📞Contact Us</h4>
                <p>+233 276 899 234</p>
                <p>Email: ama@gmail.com</p>
            </div>
            <div class="footer-col">
                <h4>📃Company</h4>
                <p>About us</p>
                <p>Privacy Policy</p>
                <p>Terms of Service</p>
            </div>
            <div class="footer-col">
                <h4>❓FAQs</h4>
                <p>FAQs</p>
                <p>Support</p>
            </div>
            <div class="footer-col">
                <h4>Social Media</h4>
                <div class="social-icons">
                    <i class="fab fa-facebook"></i></a>
                    <i class="fab fa-instagram"></i></a>
                    <i class="fab fa-linkedin"></i></a>
                    <i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 LittleCare Clinic. All rights reserved.
        </div>
    </footer>
    
</body>
</html>
